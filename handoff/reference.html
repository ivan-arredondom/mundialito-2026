<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Group — Reference (chosen)</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Geist', system-ui, sans-serif; background: #ececec; }
    .grid { display: flex; gap: 24px; padding: 24px; align-items: flex-start; flex-wrap: wrap; }
    .label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 8px; }
    .col { display: flex; flex-direction: column; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../leaderboard-mock.jsx"></script>
  <script type="text/babel" src="../share-variations.jsx"></script>
  <script type="text/babel" src="../share-variations-desktop.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div className="grid">
          <div className="col">
            <div className="label">Mobile — Option A</div>
            <VarA />
          </div>
          <div className="col">
            <div className="label">Mobile — Share sheet</div>
            <VarE />
          </div>
          <div className="col" style={{ width: '100%' }}>
            <div className="label">Desktop — Option A</div>
            <DesktopA />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
